<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>RouteAura — AI-Powered Travel Planning & Booking | India's Smartest Trip Planner</title>
    <meta name="description" content="Plan your dream Indian vacation with RouteAura's AI Trip Copilot. Get personalized itineraries, hotel recommendations, hidden gems, weather alerts, and budget breakdowns for 50+ destinations across India. From Kashmir to Kanyakumari." />
    <meta name="keywords" content="India travel planner, AI trip planner, hotel booking India, holiday packages, hidden gems India, Goa trip planner, Kerala backwaters, Rajasthan tour, Manali trip, budget travel India, RouteAura, travel copilot" />
    <meta name="author" content="Aurocode" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="canonical" href="https://routeaura.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://routeaura.com/" />
    <meta property="og:title" content="RouteAura — AI Travel Planner for India" />
    <meta property="og:description" content="Smart AI-powered trip planning with real-time weather alerts, hotel recommendations from verified reviews, hidden gems with Google Maps, and intelligent budget allocation." />
    <meta property="og:site_name" content="RouteAura" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@RouteAura" />
    <meta name="twitter:title" content="RouteAura — India's AI Travel Copilot" />
    <meta name="twitter:description" content="Plan trips to 50+ Indian destinations with AI-generated itineraries, live hotel scores, weather alerts, and hidden gems." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "RouteAura",
      "description": "AI-powered travel planning platform for India",
      "url": "https://routeaura.com",
      "areaServed": "India",
      "founder": { "@type": "Organization", "name": "Aurocode" }
    }
    </script>

    <!-- Google Fonts: Inter for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
